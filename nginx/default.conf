upstream django_upstream {
    server web:8000;
}

server {
    listen 80;
    server_name portal.adib.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name portal.adib.com;

    ssl_certificate /etc/nginx/certs/portal.adib.com.crt;
    ssl_certificate_key /etc/nginx/certs/portal.adib.com.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 11G;
    client_body_temp_path /deployment/nginx_client_temp;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /app/media/;
        access_log off;
        expires 1d;
    }

    location /protected-download/local/ {
        internal;
        alias /deployment/local/;
    }

    location /protected-download/nas/ {
        internal;
        alias /deployment/nas/;
    }

    location / {
        proxy_pass http://django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_redirect off;
    }
}
